name: Bright OS delivery

on:
  push:
    branches:
      - main
      - dev
      - 'codex/**'
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - closed
  delete:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Optional codex/* branch whose preview slot should be released'
        required: false
        type: string

jobs:
  public-guard:
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-public-branch.mjs

  checks:
    needs: public-guard
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm --prefix apps/bright_os_app ci
      - run: npm --prefix services/bright_os_api ci
      - run: npm --prefix apps/bright_os_app run lint
      - run: npm --prefix apps/bright_os_app run test -- --fileParallelism=false
      - run: node --test
        working-directory: services/bright_os_api

  deploy-preview:
    needs: checks
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: deploy/scripts/ci-ssh-deploy.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}

  deploy-dev:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: deploy/scripts/ci-ssh-deploy.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: dev
          BRIGHT_OS_COMMIT: ${{ github.sha }}

  deploy-prod:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: deploy/scripts/ci-ssh-deploy.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: main
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Promote accepted dev metadata into production
        run: deploy/scripts/ci-ssh-promote-deployment.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_SOURCE_BRANCH: dev
          BRIGHT_OS_TARGET_ENVIRONMENT: prod
          BRIGHT_OS_TARGET_BRANCH: main
          BRIGHT_OS_TARGET_COMMIT: ${{ github.sha }}

  release-preview-slot:
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.base_ref == 'dev' && startsWith(github.head_ref, 'codex/')) ||
      (github.event_name == 'delete' && github.event.ref_type == 'branch' && startsWith(github.event.ref, 'codex/')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_branch, 'codex/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Promote accepted preview metadata into dev
        if: github.event_name == 'pull_request'
        run: deploy/scripts/ci-ssh-promote-deployment.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_SOURCE_BRANCH: ${{ github.head_ref }}
          BRIGHT_OS_ACCEPTED_PR_NUMBER: ${{ github.event.pull_request.number }}
          BRIGHT_OS_TARGET_ENVIRONMENT: dev
          BRIGHT_OS_TARGET_BRANCH: dev
          BRIGHT_OS_TARGET_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
      - run: deploy/scripts/ci-ssh-release-slot.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ inputs.release_branch || github.head_ref || github.event.ref }}
