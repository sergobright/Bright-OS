name: Bright OS delivery

on:
  push:
    branches:
      - main
      - dev
      - 'codex/**'
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - closed
  delete:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Optional codex/* branch whose preview slot should be released'
        required: false
        type: string

env:
  BRIGHT_TEMPORAL_REQUIRED: 'true'

jobs:
  public-guard:
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-public-branch.mjs

  classify-delivery:
    needs: public-guard
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    outputs:
      delivery_class: ${{ steps.classify.outputs.delivery_class }}
      requires_preview: ${{ steps.classify.outputs.requires_preview }}
      requires_dev_deploy: ${{ steps.classify.outputs.requires_dev_deploy }}
      auto_merge: ${{ steps.classify.outputs.auto_merge }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: git fetch origin +refs/heads/dev:refs/remotes/origin/dev +refs/heads/main:refs/remotes/origin/main
      - id: classify
        run: node deploy/scripts/classify-delivery.mjs --github-output "$GITHUB_OUTPUT"
      - name: Temporal delivery classified
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event delivery_classified --delivery-class "$BRIGHT_OS_DELIVERY_CLASS" --source classify-delivery
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
          BRIGHT_OS_DELIVERY_CLASS: ${{ steps.classify.outputs.delivery_class }}
      - name: Temporal no preview required
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/') && steps.classify.outputs.delivery_class == 'infra-docs'
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event no_preview_required --delivery-class infra-docs --source classify-delivery
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}

  checks:
    needs:
      - public-guard
      - classify-delivery
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Temporal preview branch pushed
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event branch_pushed --source github-checks
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal checks started
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event checks_started --source github-checks
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - run: npm ci
      - run: npm --prefix apps/bright_os_app ci
      - run: npm --prefix services/bright_os_api ci
      - run: node --test scripts/*.test.mjs
      - run: npm --prefix apps/bright_os_app run lint
      - run: npm --prefix apps/bright_os_app run test -- --fileParallelism=false
      - run: node --test
        working-directory: services/bright_os_api
      - name: Temporal checks passed
        if: success() && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event checks_passed --source github-checks
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal checks failed
        if: failure() && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/')
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event checks_failed --source github-checks
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}

  temporal-worker-check:
    needs: public-guard
    if: github.event_name != 'delete' && !(github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/bright_os_temporal/package-lock.json
      - run: npm --prefix services/bright_os_temporal ci
      - run: npm --prefix services/bright_os_temporal test

  deploy-preview:
    needs:
      - classify-delivery
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/') && needs['classify-delivery'].outputs.requires_preview == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/bright_os_temporal/package-lock.json
      - name: Temporal preview deploy started
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event preview_deploy_started --source deploy-preview
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
          BRIGHT_OS_BASE_COMMIT: ${{ github.event.before }}
      - id: deploy_preview
        run: deploy/scripts/ci-ssh-deploy.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal preview deploy passed
        if: success()
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event preview_deploy_passed --slot "$BRIGHT_OS_PREVIEW_SLOT" --source deploy-preview
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
          BRIGHT_OS_PREVIEW_SLOT: ${{ steps.deploy_preview.outputs.preview_slot }}
      - name: Temporal preview deploy failed
        if: failure()
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event preview_deploy_failed --slot "$BRIGHT_OS_PREVIEW_SLOT" --source deploy-preview
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
          BRIGHT_OS_PREVIEW_SLOT: ${{ steps.deploy_preview.outputs.preview_slot }}

  auto-merge-infra-docs:
    needs:
      - classify-delivery
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/codex/') && needs['classify-delivery'].outputs.auto_merge == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Temporal infra/docs handoff started
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event delivery_handoff_started --delivery-class infra-docs --source auto-merge-infra-docs
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal infra/docs auto-merge started
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event auto_merge_started --delivery-class infra-docs --source auto-merge-infra-docs
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - run: deploy/scripts/accept-preview.sh "$BRIGHT_OS_BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_ACCEPT_INFRA_DOCS_ONLY: 'true'
      - name: Temporal infra/docs auto-merge enabled
        if: success()
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event auto_merge_enabled --delivery-class infra-docs --source auto-merge-infra-docs
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal infra/docs handoff passed
        if: success()
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event delivery_handoff_passed --delivery-class infra-docs --source auto-merge-infra-docs
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal infra/docs handoff failed
        if: failure()
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event delivery_handoff_failed --delivery-class infra-docs --source auto-merge-infra-docs
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal infra/docs auto-merge failed
        if: failure()
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event auto_merge_failed --delivery-class infra-docs --source auto-merge-infra-docs
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.ref_name }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}

  deploy-dev:
    needs:
      - classify-delivery
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev' && needs['classify-delivery'].outputs.requires_dev_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/bright_os_temporal/package-lock.json
      - name: Temporal dev deploy started
        run: deploy/scripts/ci-temporal-signal.sh promotion --target dev --sha "$BRIGHT_OS_COMMIT" --event dev_deploy_started --source deploy-dev
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - run: deploy/scripts/ci-ssh-deploy.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: dev
          BRIGHT_OS_COMMIT: ${{ github.sha }}
          BRIGHT_OS_BASE_COMMIT: ${{ github.event.before }}
      - name: Temporal dev version recorded
        run: deploy/scripts/ci-temporal-signal.sh promotion --target dev --sha "$BRIGHT_OS_COMMIT" --event dev_version_recorded --source deploy-dev
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal accepted previews started
        run: deploy/scripts/ci-temporal-signal.sh promotion --target dev --sha "$BRIGHT_OS_COMMIT" --event accepted_previews_started --source deploy-dev
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - id: complete_accepted_previews
        run: deploy/scripts/ci-ssh-complete-accepted-previews.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_TARGET_BRANCH: dev
          BRIGHT_OS_TARGET_COMMIT: ${{ github.sha }}
      - name: Temporal accepted previews passed
        run: deploy/scripts/ci-temporal-signal.sh promotion --target dev --sha "$BRIGHT_OS_COMMIT" --event accepted_previews_passed --source deploy-dev
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal accepted previews failed
        if: failure() && steps.complete_accepted_previews.outcome == 'failure'
        run: deploy/scripts/ci-temporal-signal.sh promotion --target dev --sha "$BRIGHT_OS_COMMIT" --event accepted_previews_failed --source deploy-dev
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal dev deploy passed
        if: success()
        run: deploy/scripts/ci-temporal-signal.sh promotion --target dev --sha "$BRIGHT_OS_COMMIT" --event dev_deploy_passed --source deploy-dev
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal dev deploy failed
        if: failure()
        run: deploy/scripts/ci-temporal-signal.sh promotion --target dev --sha "$BRIGHT_OS_COMMIT" --event dev_deploy_failed --source deploy-dev
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}

  deploy-prod:
    needs:
      - checks
      - temporal-worker-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/bright_os_temporal/package-lock.json
      - name: Temporal prod deploy started
        run: deploy/scripts/ci-temporal-signal.sh promotion --target prod --sha "$BRIGHT_OS_COMMIT" --event prod_deploy_started --source deploy-prod
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - run: deploy/scripts/ci-ssh-deploy.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: main
          BRIGHT_OS_COMMIT: ${{ github.sha }}
          BRIGHT_OS_BASE_COMMIT: ${{ github.event.before }}
      - name: Temporal prod version recorded
        run: deploy/scripts/ci-temporal-signal.sh promotion --target prod --sha "$BRIGHT_OS_COMMIT" --event prod_version_recorded --source deploy-prod
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal prod deploy passed
        if: success()
        run: deploy/scripts/ci-temporal-signal.sh promotion --target prod --sha "$BRIGHT_OS_COMMIT" --event prod_deploy_passed --source deploy-prod
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal prod deploy failed
        if: failure()
        run: deploy/scripts/ci-temporal-signal.sh promotion --target prod --sha "$BRIGHT_OS_COMMIT" --event prod_deploy_failed --source deploy-prod
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}

  record-infra-docs-merge:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'codex/') && contains(toJson(github.event.pull_request.labels), 'bright-delivery:infra-docs')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/bright_os_temporal/package-lock.json
      - name: Temporal infra/docs PR merged
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event pr_merged --delivery-class infra-docs --pr-number "$BRIGHT_OS_PR_NUMBER" --pr-url "$BRIGHT_OS_PR_URL" --source record-infra-docs-merge
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ github.event.pull_request.head.ref }}
          BRIGHT_OS_COMMIT: ${{ github.event.pull_request.head.sha }}
          BRIGHT_OS_PR_NUMBER: ${{ github.event.pull_request.number }}
          BRIGHT_OS_PR_URL: ${{ github.event.pull_request.html_url }}

  release-preview-slot:
    if: |
      (github.event_name == 'delete' && github.event.ref_type == 'branch' && startsWith(github.event.ref, 'codex/')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_branch, 'codex/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: services/bright_os_temporal/package-lock.json
      - name: Temporal preview release started
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event slot_release_started --source release-preview-slot
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ inputs.release_branch || github.head_ref || github.event.ref }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - id: release_slot
        run: deploy/scripts/ci-ssh-release-slot.sh
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_REPO: ${{ vars.BRIGHT_DEPLOY_REPO || '/srv/projects/bright-os' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ inputs.release_branch || github.head_ref || github.event.ref }}
          BRIGHT_OS_REQUIRE_PREVIEW_SLOT_RELEASE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      - name: Temporal preview released
        if: success() && steps.release_slot.outputs.released == 'true'
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event slot_released --source release-preview-slot
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ inputs.release_branch || github.head_ref || github.event.ref }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal preview branch deleted
        if: success() && github.event_name == 'delete' && steps.release_slot.outputs.released != 'true'
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event branch_deleted --source release-preview-slot
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ inputs.release_branch || github.head_ref || github.event.ref }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
      - name: Temporal preview release failed
        if: failure()
        run: deploy/scripts/ci-temporal-signal.sh preview --branch "$BRIGHT_OS_BRANCH" --sha "$BRIGHT_OS_COMMIT" --event slot_release_failed --source release-preview-slot
        env:
          BRIGHT_DEPLOY_HOST: ${{ vars.BRIGHT_DEPLOY_HOST }}
          BRIGHT_DEPLOY_USER: ${{ vars.BRIGHT_DEPLOY_USER }}
          BRIGHT_DEPLOY_SSH_PORT: ${{ vars.BRIGHT_DEPLOY_SSH_PORT || '22' }}
          BRIGHT_DEPLOY_SSH_KEY: ${{ secrets.BRIGHT_DEPLOY_SSH_KEY }}
          BRIGHT_OS_BRANCH: ${{ inputs.release_branch || github.head_ref || github.event.ref }}
          BRIGHT_OS_COMMIT: ${{ github.sha }}
