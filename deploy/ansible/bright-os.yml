- name: Configure Bright OS one-VPS environments
  hosts: bright_os
  become: true
  tasks:
    - name: Create deploy user
      ansible.builtin.user:
        name: "{{ bright_os_deploy_user }}"
        shell: /bin/bash
        create_home: true

    - name: Create service group
      ansible.builtin.group:
        name: "{{ bright_os_service_group }}"
        system: true

    - name: Create service user
      ansible.builtin.user:
        name: "{{ bright_os_service_user }}"
        group: "{{ bright_os_service_group }}"
        shell: /usr/sbin/nologin
        create_home: false
        system: true

    - name: Allow service user to write deploy-owned runtime files
      ansible.builtin.user:
        name: "{{ bright_os_service_user }}"
        groups: "{{ bright_os_deploy_user }}"
        append: true

    - name: Allow local deploy writers to update environment files
      ansible.builtin.user:
        name: "{{ item }}"
        groups: "{{ bright_os_deploy_user }}"
        append: true
      loop: "{{ bright_os_deploy_writers }}"

    - name: Create environment root
      ansible.builtin.file:
        path: "{{ bright_os_env_root }}"
        state: directory
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "2775"

    - name: Allow deploy user to run deployment scripts
      ansible.builtin.file:
        path: "{{ bright_os_repo }}/deploy/scripts"
        state: directory
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rwX,g=rX,o="
        recurse: true

    - name: Allow deploy user to read environment map
      ansible.builtin.file:
        path: "{{ bright_os_repo }}/deploy/environments.json"
        state: file
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rw,g=r,o="

    - name: Allow deploy user to enter Node.js runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rwx,g=rx,o="
      loop:
        - "{{ bright_os_node_root }}"
        - "{{ bright_os_node_root }}/bin"
        - "{{ bright_os_node_root }}/lib"
        - "{{ bright_os_node_root }}/lib/node_modules"

    - name: Allow deploy user to execute Node.js binary
      ansible.builtin.file:
        path: "{{ bright_os_node_bin }}"
        state: file
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rwx,g=rx,o="

    - name: Allow deploy user to read Node.js package manager files
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rwX,g=rX,o="
        recurse: true
      loop:
        - "{{ bright_os_node_root }}/lib/node_modules/corepack"
        - "{{ bright_os_node_root }}/lib/node_modules/npm"

    - name: Create environment parent directories
      ansible.builtin.file:
        path: "{{ bright_os_env_root }}/{{ item.value.path }}"
        state: directory
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "2775"
      loop: "{{ bright_os_envs | dict2items | list }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Check production source checkout path
      ansible.builtin.stat:
        path: "{{ bright_os_env_root }}/{{ bright_os_envs.prod.path }}/source"
      register: bright_os_prod_source

    - name: Seed production source checkout path from the current live repository
      ansible.builtin.file:
        src: "{{ bright_os_repo }}"
        dest: "{{ bright_os_env_root }}/{{ bright_os_envs.prod.path }}/source"
        state: link
      when: not bright_os_prod_source.stat.exists

    - name: Create environment directories
      ansible.builtin.file:
        path: "{{ bright_os_env_root }}/{{ item.0.value.path }}/{{ item.1 }}"
        state: directory
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "2775"
      loop: "{{ bright_os_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list | product(['web', 'mobile-update', 'data', 'source']) | list }}"
      loop_control:
        label: "{{ item.0.key }}/{{ item.1 }}"

    - name: Ensure non-production deploy artifact ownership
      ansible.builtin.file:
        path: "{{ bright_os_env_root }}/{{ item.0.value.path }}/{{ item.1 }}"
        state: directory
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rwX,g=rwX,o=rX"
        recurse: true
      loop: "{{ bright_os_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list | product(['web', 'mobile-update', 'data', 'source']) | list }}"
      loop_control:
        label: "{{ item.0.key }}/{{ item.1 }}"

    - name: Ensure non-production data directories keep deploy setgid
      ansible.builtin.file:
        path: "{{ bright_os_env_root }}/{{ item.value.path }}/data"
        state: directory
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "2775"
      loop: "{{ bright_os_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}/data"

    - name: Ensure nested non-production data directories keep deploy setgid
      ansible.builtin.command:
        argv:
          - find
          - "{{ bright_os_env_root }}/{{ item.value.path }}/data"
          - -type
          - d
          - -exec
          - chmod
          - "2775"
          - "{}"
          - "+"
      loop: "{{ bright_os_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}/data"
      changed_when: false
      when: not ansible_check_mode

    - name: Create preview slot status directory
      ansible.builtin.file:
        path: "{{ bright_os_env_root }}/preview-status"
        state: directory
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "0775"

    - name: Ensure public landing root exists
      ansible.builtin.file:
        path: "{{ bright_os_public_site_root }}"
        state: directory
        mode: "0755"

    - name: Allow deploy user to publish production web and OTA assets
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rwX,g=rwX,o=rX"
        recurse: true
      loop:
        - "{{ bright_os_repo }}/deploy/web"
        - "{{ bright_os_repo }}/deploy/mobile-update"
        - "{{ bright_os_repo }}/deploy/releases"

    - name: Allow deploy user to update production Bright OS database ledger
      ansible.builtin.file:
        path: "{{ bright_os_repo }}/data"
        state: directory
        group: "{{ bright_os_deploy_user }}"
        mode: "2775"

    - name: Allow deploy user to update production Bright OS database file
      ansible.builtin.file:
        path: "{{ bright_os_repo }}/data/bright_os.sqlite"
        state: file
        group: "{{ bright_os_deploy_user }}"
        mode: "0664"

    - name: Check production Bright OS database sidecar files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ bright_os_repo }}/data/bright_os.sqlite-wal"
        - "{{ bright_os_repo }}/data/bright_os.sqlite-shm"
      register: bright_os_prod_db_sidecars

    - name: Allow deploy user to update existing production Bright OS database sidecars
      ansible.builtin.file:
        path: "{{ item.stat.path }}"
        state: file
        group: "{{ bright_os_deploy_user }}"
        mode: "0664"
      loop: "{{ bright_os_prod_db_sidecars.results }}"
      when: item.stat.exists

    - name: Seed preview slot registry if missing
      ansible.builtin.command:
        cmd: "{{ bright_os_repo }}/deploy/scripts/preview-slots.sh init"
        creates: "{{ bright_os_env_root }}/preview-slots.json"

    - name: Ensure preview slot state ownership
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "0664"
      loop:
        - "{{ bright_os_env_root }}/preview-slots.json"
        - "{{ bright_os_env_root }}/preview-slots.lock"
      when: not ansible_check_mode

    - name: Ensure preview status ownership
      ansible.builtin.file:
        path: "{{ bright_os_env_root }}/preview-status"
        owner: "{{ bright_os_deploy_user }}"
        group: "{{ bright_os_deploy_user }}"
        mode: "u=rwX,g=rwX,o=rX"
        recurse: true
      when: not ansible_check_mode

    - name: Seed per-environment Bright OS API env files from current production env
      ansible.builtin.copy:
        src: "{{ bright_os_api_env_source }}"
        dest: "{{ bright_os_env_root }}/{{ item.value.path }}/bright-os-api.env"
        remote_src: true
        force: false
        owner: root
        group: root
        mode: "0640"
      loop: "{{ bright_os_envs | dict2items | rejectattr('key', 'equalto', 'prod') | list }}"
      loop_control:
        label: "{{ item.key }}"
      when: not ansible_check_mode

    - name: Install Bright OS API systemd units
      ansible.builtin.template:
        src: templates/brightos-api.service.j2
        dest: "/etc/systemd/system/{{ item.value.service }}"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ bright_os_envs | dict2items | list }}"
      loop_control:
        label: "{{ item.value.service }}"
      notify: Reload systemd

    - name: Install Bright OS main checkout sync script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/sync-local-main-checkout.sh"
        dest: /srv/opt/bright-os-main-sync.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install Bright OS Caddy routes
      ansible.builtin.blockinfile:
        path: "{{ bright_os_caddyfile }}"
        marker: "# {mark} BRIGHT OS DEV/PREVIEW ENVIRONMENTS"
        block: "{{ lookup('template', 'templates/Caddyfile.j2') }}"
        validate: "caddy validate --adapter caddyfile --config %s"
      notify:
        - Validate Caddy
        - Reload Caddy

    - name: Install deploy user sudoers boundary
      ansible.builtin.template:
        src: templates/brightos-deploy-sudoers.j2
        dest: /etc/sudoers.d/brightos-deploy
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Validate Caddy
      ansible.builtin.command:
        cmd: "caddy validate --config {{ bright_os_caddyfile }}"
      changed_when: false

    - name: Reload Caddy
      ansible.builtin.systemd_service:
        name: caddy
        state: reloaded
